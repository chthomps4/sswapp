name: Weekly Workflow Code Health

on:
  workflow_dispatch:
  schedule:
    - cron: "15 11 * * 1"

jobs:
  code-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Unit tests
        run: npm test

      - name: Operational tests
        run: npm run test:operational

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
